services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_ID=${STEAM_ID}
      - PORT=3001
    volumes:
      - kanban_data:/app/data
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - coolify          # réseau Traefik géré par Coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.steam-kanban.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.steam-kanban.entrypoints=https"
      - "traefik.http.routers.steam-kanban.tls=true"
      - "traefik.http.routers.steam-kanban.tls.certresolver=letsencrypt"
      - "traefik.http.services.steam-kanban.loadbalancer.server.port=80"

volumes:
  kanban_data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
    name: coolify
