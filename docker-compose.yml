services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - kanban_data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  kanban_data:
