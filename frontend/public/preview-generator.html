<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #2a2b35;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 900px 600px at 50% 50%, rgba(232,129,58,0.06) 0%, transparent 70%);
  }

  .content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    text-align: center;
    padding: 0 80px;
  }

  .logo-row {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-icon { width: 44px; height: 44px; flex-shrink: 0; }
  .logo-label {
    font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
  }

  .headline {
    font-size: 82px; font-weight: 900; line-height: 1.0;
    letter-spacing: -0.02em;
  }
  .headline span:nth-child(1) { color: #fff; }
  .headline span:nth-child(2) { color: #e8813a; }
  .headline span:nth-child(3) { color: rgba(255,255,255,0.55); }

  .desc {
    font-size: 18px; color: rgba(255,255,255,0.45); font-weight: 400; line-height: 1.5;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .tag {
    font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px;
    border: 1px solid; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .tag-steam    { color: #47a7f5; border-color: rgba(71,167,245,0.35);  background: rgba(71,167,245,0.08); }
  .tag-kanban   { color: #e8813a; border-color: rgba(232,129,58,0.35);  background: rgba(232,129,58,0.08); }
  .tag-live     { color: #4cd882; border-color: rgba(76,216,130,0.35);  background: rgba(76,216,130,0.08); }
  .tag-public   { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
  .tag-community{ color: #f5c518; border-color: rgba(245,197,24,0.35);  background: rgba(245,197,24,0.08); }
  .tag-fascism  { color: #ff69b4; border-color: rgba(255,105,180,0.35); background: rgba(255,105,180,0.08); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">

  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 496 512" xmlns="http://www.w3.org/2000/svg">
      <circle cx="248" cy="256" r="248" fill="#fff"/>
      <path fill="#e8813a" d="M496 256c0 137-111.2 248-248.4 248-113.8 0-209.7-76.3-239-180.4l95.2 39.3c6.4 32.1 34.9 56.4 68.9 56.4 38.2 0 69.1-31.1 68.9-69.3l84.5-60.2c52.1 1.3 95.8-40.9 95.8-93.5 0-51.6-42-93.5-93.7-93.5s-93.7 42-93.7 93.5v1.2L176.6 279c-15.5-.9-30.7 3.4-43.5 12.1L0 236.1C10.2 108.4 117.1 8 247.6 8 384.8 8 496 119 496 256zM155.7 384.3l-30.5-12.6a52.79 52.79 0 0 0 27.2 25.8c26.9 11.2 57.8-1.6 69-28.4 5.4-13 5.5-27.3.1-40.3-5.4-13-15.5-23.2-28.5-28.6-12.7-5.3-26.4-5.5-38.8-1.4l31.5 13c19.8 8.2 29.2 30.9 20.9 50.7-8.3 19.9-31 29.2-50.9 21zm173.8-129.9c-34.4 0-62.4-28-62.4-62.3s28-62.3 62.4-62.3 62.4 28 62.4 62.3-27.9 62.3-62.4 62.3zm.1-15.6c25.9 0 46.9-21 46.9-46.8 0-25.9-21-46.8-46.9-46.8s-46.9 21-46.9 46.8c.1 25.8 21.1 46.8 46.9 46.8z"/>
    </svg>
    <span class="logo-label">KangBanGaming</span>
  </div>

  <div class="headline">
    <span>Du Kanban&nbsp;</span><span>Du Gang Bang&nbsp;</span><span>Du Gaming</span>
  </div>

  <div class="desc">
    Un gestionnaire de tâches pour gamers, optimisé pour Steam — backlog, stats live et boards partageables.
  </div>

  <div class="tags">
    <span class="tag tag-steam">⊹ Steam</span>
    <span class="tag tag-kanban">⊹ Kanban</span>
    <span class="tag tag-live">⊹ Stats Live</span>
    <span class="tag tag-public">⊹ Boards Publics</span>
    <span class="tag tag-community">⊹ Community</span>
    <span class="tag tag-fascism">⊹ Authoritarism</span>
  </div>

</div>
</body>
</html>
